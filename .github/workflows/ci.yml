name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: casewright
          POSTGRES_PASSWORD: casewright
          POSTGRES_DB: casewright
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U casewright"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://casewright:casewright@localhost:5432/casewright
      DATABASE_URL_SYNC: postgresql+psycopg://casewright:casewright@localhost:5432/casewright
      JWT_SECRET: ci-test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Typecheck (mypy)
        run: mypy app
      - name: Run migrations
        run: alembic upgrade head
      - name: Tests
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t casewright-backend ./backend
      - name: Build frontend image
        run: docker build -t casewright-frontend ./frontend
